name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; newer pushes supersede in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pages must be enabled once by hand: Settings → Pages → Source = "GitHub Actions".
      # (The Actions token cannot create the Pages site itself.) After that, this
      # step just reads the existing config and every push deploys automatically.
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload docs as the site
        uses: actions/upload-pages-artifact@v3
        with:
          # Site root = docs/ (index.html is the documentation page; demo at /demo/).
          path: docs

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
