  <text x="120" y="315" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="normal" fill="#bb9a8d" text-anchor="start" opacity="1.0">Entry gates: lint, base ref, ACs↔tests, plan+tasks.</text>
