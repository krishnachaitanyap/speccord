<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="speccord — the spec is the contract your code is checked against">
  <defs>
    <linearGradient id="bring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.55" stop-color="#34d399"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bcheck" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e2e8f0"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="#0f172a"/>
  <!-- accent baseline -->
  <rect x="0" y="470" width="1280" height="3" fill="#1e293b"/>

  <!-- mark -->
  <g transform="translate(232,180) scale(0.55)">
    <rect x="0" y="0" width="512" height="512" rx="116" fill="#0b1220"/>
    <rect x="22" y="22" width="468" height="468" rx="96" fill="none" stroke="url(#bring)" stroke-width="14"/>
    <rect x="150" y="156" width="150" height="20" rx="10" fill="#1e293b"/>
    <rect x="150" y="200" width="100" height="20" rx="10" fill="#1e293b"/>
    <path d="M150 290 L228 366 L372 176" fill="none" stroke="url(#bcheck)" stroke-width="48"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="540" y="320" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="132"
        font-weight="bold" fill="url(#word)">speccord</text>
  <text x="546" y="388" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="30"
        fill="#38bdf8">the spec is the contract your code is checked against</text>
  <text x="546" y="436" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="23"
        fill="#94a3b8">spec-driven development CLI · deterministic gates · AI-agent native</text>
</svg>
